; ============================================================================
; PROJECT LAKSHMI — Arduino Nano (ATmega328P)
; ============================================================================
; Two build environments:
;   pio run -e flight       → builds the full FSM flight code
;   pio run -e bench_test   → builds the bench test (solenoid + servo + LoRa)
; ============================================================================

[env]
platform = atmelavr
board = nanoatmega328
framework = arduino
board_upload.speed = 115200
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    arduino-libraries/Servo@^1.2.1
build_flags = -Wall

; --- FLIGHT CODE (full FSM) ---
[env:flight]
build_src_filter = +<*> -<bench_test.cpp>

; --- BENCH TEST (solenoid + servo + LoRa only) ---
[env:bench_test]
build_src_filter = +<bench_test.cpp>
